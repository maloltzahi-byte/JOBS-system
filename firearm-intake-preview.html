<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>מערכת בדיקה מקדימה — רישוי כלי ירייה</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root { --bg:#f5f5f7; --panel:#fff; --panel-soft:#fafafc; --text:#1d1d1f; --muted:#6e6e73; --line:#e5e5ea; --blue:#0071e3; --green:#2ea043; --green-soft:#ebf8ee; --orange:#ff9f0a; --orange-soft:#fff6e8; --red:#d92d20; --red-soft:#fff1f0; --shadow:0 12px 36px rgba(0,0,0,.06); --header-h:68px; --footer-h:94px; }
  *{box-sizing:border-box} html,body{height:100%} body{margin:0;font-family:'Assistant',sans-serif;background:var(--bg);color:var(--text);overflow:hidden}
  .app{height:100vh;display:grid;grid-template-columns:430px 1fr;overflow:hidden}
  .left{background:var(--panel);border-left:1px solid var(--line);box-shadow:var(--shadow);display:grid;grid-template-rows:var(--header-h) 1fr var(--footer-h)}
  .left-head{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--line)}
  .brand strong{font-size:19px;font-weight:800;display:block} .brand span{font-size:11px;color:var(--muted);font-weight:700}
  .ver{padding:6px 10px;border-radius:999px;background:#f1f2f4;font-size:11px;color:var(--muted);font-weight:700}
  .left-body{padding:24px 22px 18px;display:grid;grid-template-rows:auto auto 1fr auto;gap:14px;min-height:0}
  .step-meta{font-size:11px;font-weight:800;color:var(--blue);letter-spacing:.08em}
  .step-title{margin:0;font-size:30px;line-height:1.15;font-weight:800;min-height:70px}
  .field-stack{display:grid;gap:10px}
  .hint{font-size:13px;color:var(--muted);line-height:1.45;min-height:20px}
  .choice-grid{display:grid;grid-template-columns:1fr;gap:10px}
  .choice-btn{border:1px solid var(--line);background:var(--panel-soft);border-radius:14px;color:var(--text);cursor:pointer;transition:.18s;padding:14px;font-size:15px;text-align:right;font-weight:700}
  .choice-btn:hover{background:#f0f3f7} .choice-btn.active{background:var(--blue);border-color:var(--blue);color:#fff}
  .text-input{width:100%;padding:14px 16px;border-radius:14px;border:1px solid var(--line);background:var(--panel-soft);font-size:16px;font-weight:600}
  .text-input:focus{outline:none;border-color:var(--blue);background:#fff;box-shadow:0 0 0 4px rgba(0,113,227,.12)}
  .validation{min-height:18px;font-size:12px;color:var(--red);font-weight:700}
  .nav-row{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .nav-btn{border:none;border-radius:12px;padding:12px 18px;font-size:15px;font-weight:800;cursor:pointer;min-width:104px}
  .nav-btn.prev{background:#ececf1}.nav-btn.next{background:var(--blue);color:#fff}.nav-btn:disabled{opacity:.4;cursor:not-allowed}
  .dots{display:flex;gap:6px;align-items:center;justify-content:center;flex:1}.dot{width:8px;height:8px;border-radius:99px;background:#d7d7dc}.dot.active{width:24px;background:var(--blue)}
  .left-foot{border-top:1px solid var(--line);padding:16px 22px;background:#fafafa;display:grid;gap:8px}
  .action-btn{width:100%;border:none;border-radius:14px;padding:14px 16px;font-size:15px;font-weight:800;color:#fff}
  .action-btn.allow{background:#111}.action-btn.review{background:var(--orange)}.action-btn.block{background:#b7b7be}
  .gate-help{font-size:12px;color:var(--muted)}
  .right{display:grid;grid-template-rows:var(--header-h) 1fr;overflow:hidden}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:0 24px;border-bottom:1px solid var(--line);background:rgba(255,255,255,.84)}
  .runtime{color:var(--blue);font-weight:800}.badge{padding:6px 10px;border-radius:999px;font-size:11px;font-weight:800}
  .badge.INIT{background:#f1f2f4;color:#6e6e73}.badge.CALL_RECOMMENDED{background:var(--orange-soft);color:#b86a00}.badge.HARD_BLOCK{background:var(--red-soft);color:var(--red)}
  .workspace{padding:18px 18px 18px 22px;display:grid;grid-template-rows:auto 1fr;gap:14px;overflow:hidden}
  .summary-grid{display:grid;grid-template-columns:1.2fr .8fr;gap:14px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);min-width:0}
  .card-head{padding:14px 16px;border-bottom:1px solid var(--line);font-size:12px;font-weight:800;color:var(--muted);letter-spacing:.05em}
  .card-body{padding:14px 16px} .issues-list{display:grid;gap:10px}
  .issue{border-radius:12px;padding:12px;border:1px solid transparent}.issue.BLOCK{background:var(--red-soft);border-color:#ffd1cc}.issue.REVIEW{background:var(--orange-soft);border-color:#ffe3b0}
  .issue-title{font-size:14px;font-weight:800}.issue-summary{font-size:13px;line-height:1.35}
  .preview{display:grid;grid-template-rows:auto 1fr;min-height:0}.preview-body{padding:18px;overflow:auto}
  .sec{background:var(--panel-soft);border-radius:12px;padding:10px 12px;margin-bottom:10px}.sec h4{margin:0 0 6px;font-size:14px}.sec p, .sec li{margin:0;font-size:13px;line-height:1.45}
</style>
</head>
<body>
<div class="app">
  <aside class="left">
    <div class="left-head"><div class="brand"><strong>Firearm Intake</strong><span>Pre-Call בלבד · ללא מסמכים</span></div><div class="ver">v2.0</div></div>
    <div class="left-body">
      <div class="step-meta" id="stepMeta"></div>
      <h1 class="step-title" id="stepTitle"></h1>
      <div class="field-stack"><div id="fieldBox"></div><div class="hint" id="fieldHint"></div><div class="validation" id="validationMsg"></div></div>
      <div class="nav-row"><button class="nav-btn prev" id="prevBtn">הקודם</button><div class="dots" id="dots"></div><button class="nav-btn next" id="nextBtn">הבא</button></div>
    </div>
    <div class="left-foot"><button class="action-btn block" id="releaseBtn" disabled>השלם שאלון</button><div class="gate-help" id="gateHelp">אין בקשת מסמכים בשלב זה.</div></div>
  </aside>
  <main class="right">
    <div class="topbar"><div>Regulatory Intake <span class="runtime">@pre-call-qualification</span></div><div class="badge INIT" id="gateBadge">INIT</div></div>
    <section class="workspace">
      <div class="summary-grid">
        <div class="card"><div class="card-head">HARD BLOCKS + REVIEW FLAGS</div><div class="card-body" id="issuesWrap"></div></div>
        <div class="card"><div class="card-head">STATE SNAPSHOT</div><div class="card-body" id="stateWrap"></div></div>
      </div>
      <div class="card preview"><div class="card-head">LAWYER SUMMARY</div><div class="preview-body" id="paperContainer"></div></div>
    </section>
  </main>
</div>
<script>
const uiState={currentStep:0,answers:{}};
const QUESTION_FLOW=[
  {id:'age_band',title:'Q1 — מה גילך',type:'choice',required:true,options:['מתחת ל־18','18–20','21–26','27–44','45+']},
  {id:'israel_status',title:'Q2 — מה הסטטוס שלך בישראל',type:'choice',required:true,options:['אזרח','תושב קבע','אחר']},
  {id:'residency_3y',title:'Q3 — האם התגוררת בישראל 3 שנים או ביצעת שירות בישראל',type:'choice',required:true,options:['כן','לא']},
  {id:'aliyah_law_of_return',title:'Q4 — האם עלית לישראל מכוח חוק השבות',type:'choice',required:true,options:['כן','לא','לא בטוח'],showIf:s=>s.residency_3y==='לא'},
  {id:'service_route',title:'Q5 — מה מתאר אותך הכי מדויק',type:'choice',required:true,options:['שירות צבאי','שירות בכוחות הביטחון','שירות לאומי או אזרחי','לא שירתי']},
  {id:'basis',title:'Q7 — בסיס בדיקת האפשרות',type:'choice',required:true,options:['מגורים באזור מסוים','עבודה או לימודים','שירות או רקע ביטחוני','מקצוע או תפקיד','לא בטוח']},
  {id:'locality_name',title:'יישוב רלוונטי',type:'text',required:true,hint:'נדרש רק לצורך הפניה לבדיקה חיצונית.',showIf:s=>['מגורים באזור מסוים','עבודה או לימודים'].includes(s.basis)},
  {id:'prior_license',title:'Q16 — האם היה לך בעבר רישיון נשק',type:'choice',required:true,options:['כן','לא']},
  {id:'prior_license_status',title:'Q17 — מה הסטטוס של הרישיון הקודם',type:'choice',required:true,options:['עדיין בתוקף','פג תוקף','בוטל','לא בטוח'],showIf:s=>s.prior_license==='כן'},
  {id:'prior_rejection',title:'Q18 — האם אי פעם נדחתה לך בקשה',type:'choice',required:true,options:['כן','לא','לא בטוח']},
  {id:'rejection_reason_hint',title:'Q19 — אם נדחתה, מה הסיבה הידועה',type:'choice',required:true,options:['משטרה','בריאות','אי עמידה בתבחין','חוסר במסמכים','לא בטוח'],showIf:s=>s.prior_rejection==='כן'},
  {id:'goal',title:'Q21 — מה המטרה שלך כרגע',type:'choice',required:true,options:['להבין אם יש כיוון','להתחיל תהליך בליווי עורך דין','לבדוק אפשרות לערר','לא בטוח']}
];
function visibleFlow(){return QUESTION_FLOW.filter(q=>!q.showIf||q.showIf(uiState.answers));}
function evaluate(a){
  const hardBlocks=[]; const reviewFlags=[]; const routes=[];
  if(a.age_band==='מתחת ל־18') hardBlocks.push('HARD_BLOCK_AGE');
  if(a.israel_status==='אחר') hardBlocks.push('HARD_BLOCK_STATUS');
  if(a.residency_3y==='לא' && (a.aliyah_law_of_return==='לא' || a.aliyah_law_of_return==='לא בטוח')) hardBlocks.push('HARD_BLOCK_RESIDENCY');
  if(a.residency_3y==='לא' && a.aliyah_law_of_return==='כן') reviewFlags.push('EXCEPTION_NEW_IMMIGRANT_POSSIBLE');
  if(a.basis==='מגורים באזור מסוים') {routes.push('מקום מגורים'); reviewFlags.push('REQUIRES_GEO_VERIFICATION');}
  if(a.basis==='עבודה או לימודים') {routes.push('מקום עבודה או לימודים'); reviewFlags.push('REQUIRES_GEO_VERIFICATION');}
  if(a.basis==='שירות או רקע ביטחוני') routes.push('שירות/ביטחון');
  if(a.basis==='מקצוע או תפקיד') routes.push('מקצוע/תפקיד');
  if(a.basis==='לא בטוח') {routes.push('נדרש תעדוף עו"ד'); reviewFlags.push('LAWYER_TRIAGE_REQUIRED');}
  if(a.prior_license_status==='בוטל') reviewFlags.push('PRIOR_LICENSE_CANCELLED');
  if(a.prior_license_status==='פג תוקף') reviewFlags.push('RENEWAL_OR_NEW_APPLICATION_REVIEW');
  if(a.prior_rejection==='כן') reviewFlags.push('PRIOR_REJECTION_EXISTS');
  if(['משטרה','בריאות'].includes(a.rejection_reason_hint)) reviewFlags.push('HIGH_REVIEW_SENSITIVITY');
  if(a.goal==='לבדוק אפשרות לערר' && (reviewFlags.includes('PRIOR_REJECTION_EXISTS')||reviewFlags.includes('PRIOR_LICENSE_CANCELLED'))) reviewFlags.push('APPEAL_PATH_POSSIBLE');
  const certainty=hardBlocks.length?'HARD_LAW':'OFFICIAL_PRACTICE';
  const gate=hardBlocks.length?'HARD_BLOCK':Object.keys(a).length<4?'INIT':'CALL_RECOMMENDED';
  return {hardBlocks,reviewFlags:[...new Set(reviewFlags)],routes:[...new Set(routes)],certainty,gate};
}
function validate(){const s=visibleFlow()[uiState.currentStep]; if(!s||!s.required) return {ok:true,msg:''}; const v=uiState.answers[s.id]; if(!v) return {ok:false,msg:'זה שדה חובה כדי להמשיך.'}; return {ok:true,msg:''};}
function renderLeft(){const f=visibleFlow(); const s=f[uiState.currentStep]; document.getElementById('stepMeta').textContent=`שלב ${uiState.currentStep+1} מתוך ${f.length}`; document.getElementById('stepTitle').textContent=s?.title||''; document.getElementById('fieldHint').textContent=s?.hint||'אין צורך להכין מסמכים בשלב הזה.'; document.getElementById('dots').innerHTML=f.map((_,i)=>`<span class="dot ${i===uiState.currentStep?'active':''}"></span>`).join(''); document.getElementById('prevBtn').disabled=uiState.currentStep===0; const v=validate(); document.getElementById('validationMsg').textContent=v.msg; document.getElementById('nextBtn').disabled=!v.ok||uiState.currentStep===f.length-1;
  if(!s) return; const current=uiState.answers[s.id];
  if(s.type==='choice'){document.getElementById('fieldBox').innerHTML=`<div class="choice-grid">${s.options.map(o=>`<button class="choice-btn ${current===o?'active':''}" onclick="choose('${s.id}', '${o.replace(/'/g,"\\'")}')">${o}</button>`).join('')}</div>`;}
  else {document.getElementById('fieldBox').innerHTML=`<input class="text-input" id="liveInput" value="${current||''}" placeholder="הקלד...">`; document.getElementById('liveInput').oninput=e=>{uiState.answers[s.id]=e.target.value; render();};}
}
function renderRight(){const r=evaluate(uiState.answers); const badge=document.getElementById('gateBadge'); badge.textContent=r.gate; badge.className=`badge ${r.gate}`;
  const btn=document.getElementById('releaseBtn'); btn.disabled=r.gate!=='CALL_RECOMMENDED'; btn.className=`action-btn ${r.gate==='CALL_RECOMMENDED'?'review':'block'}`; btn.textContent=r.gate==='HARD_BLOCK'?'נדרש טיפול בחסמי סף':'סיום בדיקה והעברה לשיחה';
  document.getElementById('gateHelp').textContent='שלב זה הוא Pre-Call בלבד: זיהוי מסלולים, חסמים ודגלי בדיקה.';
  const issues=[]; r.hardBlocks.forEach(x=>issues.push(`<div class="issue BLOCK"><div class="issue-title">⛔ ${x}</div><div class="issue-summary">חסם סף. נדרש בירור משפטי לפני התקדמות.</div></div>`)); r.reviewFlags.forEach(x=>issues.push(`<div class="issue REVIEW"><div class="issue-title">⚠️ ${x}</div><div class="issue-summary">נדרש בירור/אישור בשלב שיחת עו"ד.</div></div>`));
  document.getElementById('issuesWrap').innerHTML=issues.length?`<div class="issues-list">${issues.join('')}</div>`:'אין כרגע חסמים או דגלי בדיקה.';
  document.getElementById('stateWrap').innerHTML=`<div class="sec"><h4>מסלולים אפשריים</h4><p>${r.routes.join(' · ')||'טרם זוהה'}</p></div><div class="sec"><h4>רמת ודאות</h4><p>${r.certainty}</p></div><div class="sec"><h4>סטטוס</h4><p>${r.gate}</p></div>`;
  document.getElementById('paperContainer').innerHTML=`<div class="sec"><h4>תקציר לעורך דין</h4><ul><li>מסלולים אפשריים: ${r.routes.join(', ')||'טרם זוהה'}.</li><li>חסמי סף: ${r.hardBlocks.join(', ')||'ללא'}.</li><li>דגלי review: ${r.reviewFlags.join(', ')||'ללא'}.</li><li>השלב הבא: שיחה קצרה והגדרת מסלול Primary + חלופות.</li></ul></div><div class="sec"><h4>כלל מחייב</h4><p>אין לבקש מסמכים מהלקוח בשלב האבחון.</p></div>`;
}
function render(){const f=visibleFlow(); if(uiState.currentStep>=f.length) uiState.currentStep=f.length-1; renderLeft(); renderRight();}
function choose(k,v){uiState.answers[k]=v; render();}
window.choose=choose;
document.getElementById('prevBtn').onclick=()=>{if(uiState.currentStep>0){uiState.currentStep--;render();}};
document.getElementById('nextBtn').onclick=()=>{const v=validate(); if(!v.ok) return; if(uiState.currentStep<visibleFlow().length-1){uiState.currentStep++;render();}};
render();
</script>
</body>
</html>
